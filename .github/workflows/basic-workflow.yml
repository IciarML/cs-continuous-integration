name: Continuous integration example

# ICÍAR
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    # 1. Usar la variable del sistema operativo
    runs-on: ${{ matrix.os }}

    strategy:
      # 2. Definir la matriz con las distintas versiones
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        java: [ '11', '17', '21' ]

    steps:
      - uses: actions/checkout@v4

      # 3. Configur Java usando la variable de la matriz
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Run tests
        run: mvn test